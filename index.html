<style>

.nh h3{font-size:14px;font-weight:600;}.nhr{display:flex;align-items:center;gap:9px;}

.ntb{padding:9px 12px;border-bottom:1px solid #eee;display:flex;gap:7px;flex-wrap:wrap;}

.nb2{flex:1;min-width:0;}.nw{font-size:13px;font-weight:600;color:var(--black);margin-bottom:2px;word-break:break-word;}
.nctx{font-size:10px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

<header><div class="hi">
  <div class="hl"><span style="font-size:26px">🇩🇪</span><div><h1>德國入籍測試 Einbürgerungstest</h1><p>311題官方題庫 · 來源：einbuergerungstest-fragen.de · 繁體中文對照</p></div></div>
  <div class="hright">
    <div><div class="stn">311</div><div class="stl">官方題目</div></div>

<div class="tbar">

  <button class="tb active" onclick="showTopic(event,'all')"><span>📋 全部題目</span><span class="tc">311</span></button>
  <button class="tb" onclick="showTopic(event,'1')"><span>🏛️ 民主與基本權利</span><span class="tc" id="c1"></span></button>
  <button class="tb" onclick="showTopic(event,'2')"><span>🗳️ 政治制度與選舉</span><span class="tc" id="c2"></span></button>
  <button class="tb" onclick="showTopic(event,'3')"><span>📜 德國歷史</span><span class="tc" id="c3"></span></button>
  <button class="tb" onclick="showTopic(event,'4')"><span>⚖️ 法律與社會</span><span class="tc" id="c4"></span></button>
  <button class="tb" onclick="showTopic(event,'5')"><span>🌍 歐洲與國際</span><span class="tc" id="c5"></span></button>
  <button class="tb" onclick="showTopic(event,'6')"><span>🗺️ 地理與文化</span><span class="tc" id="c6"></span></button>
  <button class="tb" onclick="showTopic(event,'berlin')" style="border-left:3px solid #e74c3c;"><span>🐻 柏林地方題</span><span class="tc" id="cb" style="background:#fde8e8;color:#c0392b;"></span></button>
</div>
<div class="content">
  <div class="sh"><h2 id="stitle">全部 311 題</h2><p id="sdesc">官方題庫 · 點擊頂部「開始翻譯」按鈕載入中文（翻譯後自動快取，下次立即顯示）</p></div>
  <div id="cc"></div>
</div>
</div>

<script>
const CACHE_KEY='einb_t3';
const WORDS_KEY='einb_w';
const TNAMES={'1':'民主與基本權利','2':'政治制度與選舉','3':'德國歷史','4':'法律與社會','5':'歐洲與國際','6':'地理與文化','berlin':'🐻 柏林地方題'};

function getTopic(n){if(n>=320)return'berlin';if(n<=50)return'1';if(n<=100)return'2';if(n<=150)return'3';if(n<=200)return'4';if(n<=250)return'5';return'6';}
function isImageQ(q){return/dieses Bild|Wappen|Stimmzettel|Besatzungszone|Bundesland ist Berlin|Plenarsaal|Flagge der Europ|Ernennungsurkunde/.test(q.q);}

let QS=[],cache={},curTopic='all',translating=false;
try{cache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');}catch(e){}

async function loadQuestions(){
  document.getElementById('sdesc').textContent='正在從官方網站載入題庫...';
  try{
    const r=await fetch('https://www.einbuergerungstest-fragen.de/questions.json');
    const raw=await r.json();
    const gen=raw.slice(0,300);
    const bln=raw.filter(q=>q.question_number>=320&&q.question_number<=330);
    QS=[...gen,...bln].map(q=>{const w=(q.options||[]).filter(o=>o!==q.answer);return{n:q.question_number,q:q.question,c:q.answer,w:w[0]||'',topic:getTopic(q.question_number)};});
  }catch(e){document.getElementById('cc').innerHTML='<div class="nr">⚠️ 無法載入題庫，請確保網路連線後重新整理頁面。</div>';return;}
  const cnts={};
  QS.forEach(q=>{cnts[q.topic]=(cnts[q.topic]||0)+1;});
  Object.entries(cnts).forEach(([t,c])=>{const el=document.getElementById(t==='berlin'?'cb':'c'+t);if(el)el.textContent=c;});
  updateProgress();
  renderCards(QS);
  document.getElementById('sdesc').textContent='官方題庫 · 點擊頂部「開始翻譯」按鈕載入中文';
  const cached=Object.keys(cache).length;
  if(cached>0&&cached<QS.length)translateAll();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function cardHTML(q){
  const t=cache[q.n];
  const ib=q.topic==='berlin';
  const imgNote=isImageQ(q)?`<div class="imgnote">📷 圖片題（正確答案：<b>${esc(q.c)}</b>）— <a href="https://www.einbuergerungstest-fragen.de" target="_blank">官方網站查看圖片</a></div>`:'';
  return `<div class="qc${ib?' bl':''}" data-n="${q.n}" data-topic="${q.topic}" data-de="${esc(q.q)}" data-zh="${esc(t?t.q:'')}">
<div class="qt"><div class="qm"><span class="qn${ib?' bn':''}">${q.n}</span><span class="qtag${ib?' bt':''}">${TNAMES[q.topic]}</span></div>${imgNote}
<div class="qde">${esc(q.q)}</div>
<div class="qzh${t?'':' loading'}" id="zh-q-${q.n}">${t?esc(t.q):'翻譯載入中...'}</div></div>
<div class="qa">
  <div class="ans ac"><div class="al">✓ 正確答案</div><div class="ade">${esc(q.c)}</div><div class="azh" id="zh-c-${q.n}">${t?esc(t.c):''}</div></div>
  <div class="ans aw"><div class="al">✗ 錯誤選項</div><div class="ade">${esc(q.w)}</div><div class="azh" id="zh-w-${q.n}">${t?esc(t.w):''}</div></div>
</div>
<div class="qex"><div class="qext" id="zh-e-${q.n}">📖 ${t?esc(t.e):''}</div></div>
</div>`;
}

function renderCards(list){
  const cc=document.getElementById('cc');
  if(!list.length){cc.innerHTML='<div class="nr">😕 找不到符合的題目</div>';return;}
  const ib=list.every(q=>q.topic==='berlin');
  const ban=ib?'<div class="bban"><span style="font-size:36px">🐻</span><div><h3>柏林地方題 LÃ¤nderteil Berlin</h3><p>內11題，考試從中隨機抖厖3題作答。</p></div></div>':'';
  cc.innerHTML=ban+list.map(cardHTML).join('');
}

function updateProgress(){
  const done=Object.keys(cache).length,total=QS.length||311;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('tprogfill').style.width=pct+'%';
  document.getElementById('tprogtext').textContent=done+' / '+total;
  document.getElementById('tbtn').textContent=done>=total?'✓ 翻譯完成':(translating?'翻譯中...':'開始翻譯');
}

async function translateAll(){
  if(translating||!QS.length)return;
  translating=true;
  document.getElementById('tbtn').textContent='翻譯中...';
  document.getElementById('tbtn').disabled=true;
  const need=QS.filter(q=>!cache[q.n]);
  const B=25;
  for(let i=0;i<need.length;i+=B){
    const batch=need.slice(i,i+B);
    const items=batch.map(q=>({n:q.n,q:q.q,c:q.c,w:q.w}));
    const prompt=`將以下德文入籍測試題目翻譯成繁體中文。
重要：每道題必須嚴格對應其題號（n），不能混淡。
只輸出純JSON陣列，不要任何說明或markdown。

格式：[{"n":題號,"q":"題目中文","c":"正確答案中文","w":"錯誤選項中文","e":"一句解釋15-25字"}]

德文題目：${JSON.stringify(items)}`;
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
      if(!r.ok)throw new Error('API '+r.status);
      const d=await r.json();
      const text=(d.content||[]).find(b=>b.type==='text')?.text||'';
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      parsed.forEach(t=>{
        if(!batch.find(q=>q.n===t.n))return;
        cache[t.n]=t;
        const zq=document.getElementById('zh-q-'+t.n);
        const zc=document.getElementById('zh-c-'+t.n);
        const zw=document.getElementById('zh-w-'+t.n);
        const ze=document.getElementById('zh-e-'+t.n);
        const card=document.querySelector('[data-n="'+t.n+'"]');
        if(zq){zq.textContent=t.q;zq.classList.remove('loading');}
        if(zc)zc.textContent=t.c;
        if(zw)zw.textContent=t.w;
        if(ze)ze.textContent='📖 '+t.e;
        if(card)card.dataset.zh=t.q;
      });
      localStorage.setItem(CACHE_KEY,JSON.stringify(cache));
      updateProgress();
    }catch(e){console.warn('Batch fail:',e.message);}
    await new Promise(r=>setTimeout(r,300));
  }
  translating=false;
  document.getElementById('tbtn').disabled=false;
  updateProgress();
}

function showTopic(e,key){
  curTopic=key;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById('sii').value='';document.getElementById('scc').textContent='';
  let list,title,desc;
  if(key==='all'){list=QS;title='全部 311 題';desc='官方題庫';}
  else if(key==='berlin'){list=QS.filter(q=>q.topic==='berlin');title='🐻 柏林地方題';desc='內11題，考試隨機扔3題';}
  else{list=QS.filter(q=>q.topic===key);title=TNAMES[key]||key;desc='內11'+list.length+'題';}
  document.getElementById('stitle').textContent=title;
  document.getElementById('sdesc').textContent=desc;
  renderCards(list);
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('sii').addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();
  document.getElementById('scc').textContent='';
  if(!v){let list=curTopic==='all'?QS:QS.filter(q=>q.topic===curTopic);renderCards(list);document.getElementById('stitle').textContent=curTopic==='all'?'全部 311 題':TNAMES[curTopic]||curTopic;return;}
  const f=QS.filter(q=>{const t=cache[q.n];return q.q.toLowerCase().includes(v)||q.c.toLowerCase().includes(v)||(t&&(t.q.includes(v)||t.c.includes(v)||t.w.includes(v)));});
  document.getElementById('scc').textContent='找到'+f.length+'題';
  document.getElementById('stitle').textContent='搜尋：「'+this.value+'」';
  renderCards(f);
});

let words=[];try{words=JSON.parse(localStorage.getItem(WORDS_KEY)||'[]');}catch(e){}
let curSel='',curCtx='',ft=null;
function saveBadges(){const n=words.length;document.getElementById('hnc').textContent=n;document.getElementById('ncb').textContent=n+' 個';}
function saveWS(){localStorage.setItem(WORDS_KEY,JSON.stringify(words));}
const tooltip=document.getElementById('stt');
tooltip.addEventListener('mousedown',e=>e.preventDefault());
document.addEventListener('mouseup',function(e){
  if(e.target.closest('#stt')||e.target.closest('#np'))return;
  setTimeout(()=>{
    const sel=window.getSelection();const text=sel?sel.toString().trim():'';
    if(!text||text.length<1||text.length>80)return;
    const range=sel.getRangeAt(0);const p=range.commonAncestorContainer;
    const parent=p.nodeType===3?p.parentElement:p;
    curCtx=(parent.textContent||'').trim().slice(0,60);curSel=text;
    const rect=range.getBoundingClientRect();
    document.getElementById('swd').textContent=text;tooltip.style.display='flex';
    tooltip.style.left=Math.max(80,Math.min(rect.left+rect.width/2,window.innerWidth-80))+'px';
    tooltip.style.top=Math.max(10,rect.top-50+window.scrollY)+'px';
  },10);
});
document.addEventListener('mousedown',function(e){if(!e.target.closest('#stt'))hideTooltip();});
function hideTooltip(){tooltip.style.display='none';curSel='';}
function saveWord(){const w=curSel;if(!w)return;if(words.find(x=>x.word===w)){flash('「'+w+'」已在單字本中！');hideTooltip();return;}words.unshift({word:w,context:curCtx,date:new Date().toLocaleDateString('zh-TW')});saveWS();saveBadges();renderNotes();const s=w;hideTooltip();flash('✅「'+s+'」已存到單字本！');}
function flash(msg){const el=document.getElementById('sff');document.getElementById('fm').textContent=msg;el.style.display='flex';clearTimeout(ft);ft=setTimeout(()=>el.style.display='none',2200);}
function toggleNotes(){const p=document.getElementById('np'),o=document.getElementById('nov');const open=p.classList.contains('open');if(open){p.classList.remove('open');o.style.display='none';}else{p.classList.add('open');o.style.display='block';renderNotes();}}
function renderNotes(){const nl=document.getElementById('nl');const f=(document.getElementById('nf').value||'').toLowerCase();const fl=words.filter(w=>w.word.toLowerCase().includes(f)||(w.context||'').toLowerCase().includes(f));if(!fl.length){nl.innerHTML=words.length===0?'<div class="nem"><span>📝</span>還沒有儲存任何單字<br><small>選取頁面上任何文字即可儲存</small></div>':'<div class="nem"><span>🔍</span>找不到符合的單字</div>';saveBadges();return;}nl.innerHTML=fl.map(w=>{const ri=words.indexOf(w);return'<div class="ni"><div class="nb2"><div class="nw">'+esc(w.word)+'</div>'+(w.context?'<div class="nctx">📌 '+esc(w.context)+'</div>':'')+'<div class="nd">🗓 '+w.date+'</div></div><button class="ndel" onclick="delNote('+ri+')">✕</button></div>';}).join('');saveBadges();}
function delNote(i){words.splice(i,1);saveWS();renderNotes();}
function clearNotes(){if(!words.length)return;if(confirm('確定清空所有'+words.length+'個單字？')){words=[];saveWS();renderNotes();}}
function exportNotes(){if(!words.length){flash('單字本是空的！');return;}const lines=['德國入籍測試 — 我的單字本','匙出：'+new Date().toLocaleString('zh-TW'),'─'.repeat(40),''];words.forEach((w,i)=>{lines.push((i+1)+'. '+w.word);if(w.context)lines.push('   📌 '+w.context);lines.push('   🗓 '+w.date);lines.push('');});const b=new Blob([lines.join('
')],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='單字本.txt';a.click();URL.revokeObjectURL(a.href);flash('📥 已匙出！');}
saveBadges();renderNotes();loadQuestions();
</script>
