function getTopic(n){
  if(n>=320) return 'berlin';
  if(n<=50)  return '1';
  if(n<=100) return '2';
  if(n<=150) return '3';
  if(n<=200) return '4';
  if(n<=250) return '5';
  return '6';
}
const TNAMES={'1':'民主與基本權利','2':'政治制度與選舉','3':'德國歷史','4':'法律與社會','5':'歐洲與國際','6':'地理與文化','berlin':'🐻 柏林地方題'};

const QS = RAW.map(q=>({...q, topic:getTopic(q.n)}));
let cache={};
try{cache=JSON.parse(localStorage.getItem('einb_t2')||'{}');}catch(e){}

// Count topics
const cnts={};
QS.forEach(q=>{cnts[q.topic]=(cnts[q.topic]||0)+1;});
Object.entries(cnts).forEach(([t,c])=>{
  const el=document.getElementById(t==='berlin'?'cb':'c'+t);
  if(el) el.textContent=c;
});

let currentTopic='all';
let translating=false;

// ── TRANSLATE via Claude API (artifact proxy) ──
async function translateBatch(batch) {
  if(translating) return;
  translating=true;
  const need=batch.filter(q=>!cache[q.n]);
  if(!need.length){translating=false;return;}
  
  const chunk=need.slice(0,25);
  const prompt=`請將以下德文入籍測試題目翻譯為繁體中文，只輸出純JSON，不要markdown。
格式：[{"n":題號,"q":"題目","c":"正確答案","w":"錯誤答案","e":"簡短解釋20-35字"}]

${JSON.stringify(chunk.map(q=>({n:q.n,q:q.q,c:q.c,w:q.w})))}`;

  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:prompt}]})
    });
    if(!r.ok) throw new Error(r.status);
    const d=await r.json();
    const text=(d.content||[]).find(b=>b.type==='text')?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    parsed.forEach(t=>{cache[t.n]=t;});
    localStorage.setItem('einb_t2',JSON.stringify(cache));
    // Update visible cards
    parsed.forEach(t=>{
      const eq=document.getElementById('zq'+t.n); if(eq) eq.textContent=t.q;
      const ec=document.getElementById('zc'+t.n); if(ec) ec.textContent=t.c;
      const ew=document.getElementById('zw'+t.n); if(ew) ew.textContent=t.w;
      const ee=document.getElementById('ze'+t.n); if(ee) ee.textContent='📖 '+t.e;
    });
    // translate more if needed
    if(need.length>25){
      translating=false;
      setTimeout(()=>translateBatch(need.slice(25)),500);
      return;
    }
  } catch(e){
    console.warn('Translation failed:',e);
  }
  translating=false;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function cardHTML(q){
  const t=cache[q.n];
  const ib=q.topic==='berlin';
  const hi=!!q.img;
  const imgNote=hi?`<div class="img-note">📷 圖片題：請至 <a href="https://www.einbuergerungstest-fragen.de/einbuergerungstest/index.php?mode=320-330" target="_blank" style="color:#8a6d00">官方網站</a> 查看圖片（${q.img}）</div>`:'';
  return `<div class="q-card${ib?' berlin':''}" id="card${q.n}">
  <div class="qt">
    <div class="qm">
      <span class="qn${ib?' bn':''}">第 ${q.n} 題</span>
      <span class="qtag${ib?' bt':''}">${TNAMES[q.topic]}</span>
    </div>
    ${imgNote}
    <div class="qde">${esc(q.q)}</div>
    <div class="qzh" id="zq${q.n}">${t?esc(t.q):'<span class="lz">翻譯載入中...</span>'}</div>
  </div>
  <div class="qa">
    <div class="ans ac"><div class="al">✓ 正確答案</div><div class="ade">${esc(q.c)}</div><div class="azh" id="zc${q.n}">${t?esc(t.c):''}</div></div>
    <div class="ans aw"><div class="al">✗ 錯誤選項</div><div class="ade">${esc(q.w)}</div><div class="azh" id="zw${q.n}">${t?esc(t.w):''}</div></div>
  </div>
  <div class="qex"><div class="qext" id="ze${q.n}">${t?'📖 '+esc(t.e):'<span class="lz">說明載入中...</span>'}</div></div>
</div>`;
}

async function renderCards(list){
  const cc=document.getElementById('cc');
  if(!list.length){cc.innerHTML='<div class="nr">😕 找不到符合的題目</div>';return;}
  
  const ib=list.every(q=>q.topic==='berlin');
  let top='';
  if(ib) top=`<div class="bban"><span style="font-size:36px">🐻</span><div class="bbant"><h3>柏林地方題 Länderteil Berlin</h3><p>共11題，實際考試從中隨機抽取3題。</p></div></div>`;
  
  // count untranslated
  const need=list.filter(q=>!cache[q.n]).length;
  const tprog=need>0?`<div class="tprog">🔄 正在翻譯 ${need} 題中文... 已快取 ${list.length-need} 題</div>`:`<div class="notice">✅ 全部 ${list.length} 題中文翻譯完成</div>`;
  
  cc.innerHTML=top+tprog+list.map(cardHTML).join('');
  
  // Translate untranslated
  translateBatch(list);
}

function showTopic(e,key){
  currentTopic=key;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById('si').value='';
  document.getElementById('sc').textContent='';
  
  let list,title,desc;
  if(key==='all'){list=QS;title='全部 311 題';desc='官方題庫 · 德文原題 + AI中文翻譯（快取於瀏覽器）';}
  else if(key==='berlin'){list=QS.filter(q=>q.topic==='berlin');title='🐻 柏林地方題 Länderteil Berlin';desc='共'+list.length+'題 · 考試隨機抽3題';}
  else{list=QS.filter(q=>q.topic===key);title=TNAMES[key];desc='共'+list.length+'題';}
  
  document.getElementById('stitle').textContent=title;
  document.getElementById('sdesc').textContent=desc;
  renderCards(list);
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('si').addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();
  if(!v){document.getElementById('sc').textContent='';let list=currentTopic==='all'?QS:QS.filter(q=>q.topic===currentTopic);renderCards(list);return;}
  const f=QS.filter(q=>{const t=cache[q.n];return q.q.toLowerCase().includes(v)||q.c.toLowerCase().includes(v)||q.w.toLowerCase().includes(v)||(t&&(t.q.includes(v)||t.c.includes(v)));});
  document.getElementById('sc').textContent='找到'+f.length+'題';
  document.getElementById('stitle').textContent='搜尋：「'+this.value+'」';
  document.getElementById('sdesc').textContent='找到'+f.length+'個相關題目';
  renderCards(f);
});

// ── WORD SAVE ──
let words=[];try{words=JSON.parse(localStorage.getItem('einb_w')||'[]');}catch(e){}
let curSel='',curCtx='',ft=null;

function saveBadges(){const n=words.length;document.getElementById('hnc').textContent=n;document.getElementById('ncb').textContent=n+' 個';}
function saveWS(){localStorage.setItem('einb_w',JSON.stringify(words));}

document.getElementById('sel-tooltip').addEventListener('mousedown',e=>e.preventDefault());
document.addEventListener('mouseup',function(e){
  if(e.target.closest('#sel-tooltip')||e.target.closest('#np'))return;
  setTimeout(()=>{
    const sel=window.getSelection();const text=sel?sel.toString().trim():'';
    if(!text||text.length<1||text.length>80)return;
    const range=sel.getRangeAt(0);
    const p=range.commonAncestorContainer;const parent=p.nodeType===3?p.parentElement:p;
    curCtx=(parent.textContent||'').trim().slice(0,60);curSel=text;
    const rect=range.getBoundingClientRect();
    const tt=document.getElementById('sel-tooltip');
    document.getElementById('swd').textContent=text;
    tt.style.display='flex';
    const tx=rect.left+rect.width/2,ty=rect.top-50+window.scrollY;
    tt.style.left=Math.max(80,Math.min(tx,window.innerWidth-80))+'px';
    tt.style.top=Math.max(10,ty)+'px';
  },10);
});
document.addEventListener('mousedown',function(e){if(!e.target.closest('#sel-tooltip'))hideTooltip();});
function hideTooltip(){document.getElementById('sel-tooltip').style.display='none';curSel='';}
function saveWord(){
  const w=curSel;if(!w)return;
  if(words.find(x=>x.word===w)){flash('「'+w+'」已在單字本中！');hideTooltip();return;}
  words.unshift({word:w,context:curCtx,date:new Date().toLocaleDateString('zh-TW')});
  saveWS();saveBadges();renderNotes();const s=w;hideTooltip();flash('✅「'+s+'」已存到單字本！');
}
function flash(msg){
  const el=document.getElementById('sf');document.getElementById('fm').textContent=msg;
  el.style.display='flex';clearTimeout(ft);ft=setTimeout(()=>el.style.display='none',2200);
}
function toggleNotes(){
  const p=document.getElementById('np'),o=document.getElementById('no');
  const open=p.classList.contains('open');
  if(open){p.classList.remove('open');o.style.display='none';}
  else{p.classList.add('open');o.style.display='block';renderNotes();}
}
function renderNotes(){
  const nl=document.getElementById('nl');
  const f=(document.getElementById('nf').value||'').toLowerCase();
  const fl=words.filter(w=>w.word.toLowerCase().includes(f)||(w.context||'').toLowerCase().includes(f));
  if(!fl.length){nl.innerHTML=words.length===0?'<div class="nem"><span>📝</span>還沒有儲存任何單字<br><small>選取頁面上任何文字即可儲存</small></div>':'<div class="nem"><span>🔍</span>找不到符合的單字</div>';saveBadges();return;}
  nl.innerHTML=fl.map(w=>{const ri=words.indexOf(w);return`<div class="ni"><div class="nb2"><div class="nw">${esc(w.word)}</div>${w.context?`<div class="nctx">📌 ${esc(w.context)}</div>`:''}<div class="nd">🗓 ${w.date}</div></div><button class="ndel" onclick="delNote(${ri})">✕</button></div>`;}).join('');
  saveBadges();
}
function delNote(i){words.splice(i,1);saveWS();renderNotes();}
function clearNotes(){if(!words.length)return;if(confirm('確定清空所有'+words.length+'個單字？')){words=[];saveWS();renderNotes();}}
function exportNotes(){
  if(!words.length){flash('單字本是空的！');return;}
  const lines=['德國入籍測試 — 我的單字本','匯出：'+new Date().toLocaleString('zh-TW'),'─'.repeat(40),''];
  words.forEach((w,i)=>{lines.push((i+1)+'. '+w.word);if(w.context)lines.push('   📌 '+w.context);lines.push('   🗓 '+w.date);lines.push('');});
  const b=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='單字本_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.txt';a.click();URL.revokeObjectURL(a.href);flash('📥 已匯出！');
}

// Init
saveBadges();renderNotes();
renderCards(QS);
</script>
